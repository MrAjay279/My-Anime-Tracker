<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Anime Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
      min-height: 100vh;
      color: #1e2937;
    }

    .glass {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(147, 51, 234, 0.15);
    }

    .poster-container {
      background: #f1f5f9;
      min-height: 340px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .anime-poster {
      max-height: 400px;
      max-width: 100%;
      object-fit: contain;
      transition: transform 0.4s ease;
    }
    .anime-poster:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <div class="max-w-7xl mx-auto p-4 md:p-6">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold flex items-center gap-3 header-gradient">
        <span class="text-4xl">🌌</span> Anime Tracker
      </h1>
      <div class="flex gap-2">
        <button onclick="exportJSON()" class="px-4 py-2.5 bg-violet-600 text-white rounded-2xl text-sm flex items-center gap-2">Export</button>
        <button onclick="document.getElementById('importInput').click()" class="px-4 py-2.5 bg-emerald-600 text-white rounded-2xl text-sm flex items-center gap-2">Import</button>
        <button onclick="exportPDF()" class="px-4 py-2.5 bg-blue-600 text-white rounded-2xl text-sm flex items-center gap-2">PDF</button>
      </div>
    </div>

    <!-- Stats -->
    <div id="stats" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6"></div>

    <!-- Controls with Sort -->
    <div class="flex flex-col md:flex-row gap-3 mb-6">
      <button onclick="showAddModal()" class="bg-gradient-to-r from-violet-600 to-indigo-600 text-white px-5 py-3 rounded-3xl font-medium flex items-center gap-2">
        <i class="fas fa-plus"></i> Add Anime
      </button>

      <input type="text" id="searchInput" placeholder="Search anime..." 
             class="flex-1 glass rounded-3xl px-5 py-3 text-sm focus:outline-none"
             onkeyup="filterTable()">

      <select id="statusFilter" onchange="filterTable()" class="glass rounded-3xl px-5 py-3 text-sm">
        <option value="">All Status</option>
        <option value="Watching">Watching</option>
        <option value="Completed">Completed</option>
        <option value="Dropped">Dropped</option>
        <option value="Plan to Watch">Plan to Watch</option>
      </select>

      <select id="sortFilter" onchange="filterTable()" class="glass rounded-3xl px-5 py-3 text-sm">
        <option value="name-asc">Name (A-Z)</option>
        <option value="name-desc">Name (Z-A)</option>
        <option value="rating-desc">Rating (High to Low)</option>
        <option value="rating-asc">Rating (Low to High)</option>
        <option value="progress-desc">Progress (High to Low)</option>
        <option value="updated-desc">Recently Updated</option>
      </select>
    </div>

    <input type="file" id="importInput" accept=".json" class="hidden" onchange="importJSON(event)">

    <!-- Mobile Cards -->
    <div id="mobileView" class="space-y-4 md:hidden"></div>

    <!-- Desktop Table -->
    <div class="hidden md:block glass rounded-3xl overflow-hidden">
      <table class="w-full">
        <thead>
          <tr class="border-b border-violet-100 text-xs uppercase text-slate-500">
            <th class="p-4 text-left">Anime</th>
            <th class="p-4">Season</th>
            <th class="p-4">Progress</th>
            <th class="p-4">Rating</th>
            <th class="p-4">Status</th>
            <th class="p-4 text-center">Actions</th>
          </tr>
        </thead>
        <tbody id="animeList" class="divide-y divide-slate-100 text-sm"></tbody>
      </table>
    </div>
  </div>

  <!-- Details Modal with Loading -->
  <div id="detailsModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onclick="if(event.target === this) closeDetailsModal()">
    <div class="glass w-full max-w-md rounded-3xl overflow-hidden shadow-2xl" onclick="event.stopImmediatePropagation()">
      <div class="poster-container" id="posterContainer">
        <div id="loadingSpinner" class="w-10 h-10 border-4 border-slate-300 border-t-violet-600 rounded-full animate-spin"></div>
        <img id="detailImage" class="anime-poster hidden" alt="Anime Poster">
      </div>

      <div class="p-5 space-y-4">
        <h2 id="detailName" class="text-xl font-bold text-slate-800"></h2>
        <!-- Rest of details content same as previous -->
        <div class="grid grid-cols-2 gap-4 text-sm">
          <div><p class="text-xs text-slate-500">SEASON</p><p id="detailSeason" class="font-medium"></p></div>
          <div><p class="text-xs text-slate-500">STATUS</p><span id="detailStatus" class="inline-block px-3 py-1 text-xs rounded-full"></span></div>
        </div>

        <div>
          <p class="text-xs text-slate-500 mb-1">PROGRESS</p>
          <p id="detailProgress" class="font-mono"></p>
          <div class="progress-container mt-2">
            <div id="detailProgressBar" class="progress-bar"></div>
          </div>
        </div>

        <div>
          <p class="text-xs text-slate-500">RATING</p>
          <p id="detailRating" class="text-3xl font-bold text-amber-500"></p>
        </div>

        <div>
          <p class="text-xs text-slate-500">NOTES</p>
          <p id="detailNotes" class="text-slate-600 text-sm"></p>
        </div>
      </div>

      <div class="flex gap-3 p-5 pt-0 border-t">
        <button onclick="closeDetailsModal()" class="flex-1 py-3 bg-slate-200 hover:bg-slate-300 rounded-2xl text-sm">Close</button>
        <button onclick="editFromDetails()" class="flex-1 py-3 bg-violet-600 text-white rounded-2xl text-sm">Edit</button>
      </div>
    </div>
  </div>

  <!-- Add/Edit Modal (compact) -->
  <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="glass w-full max-w-md rounded-3xl p-6">
      <h2 id="modalTitle" class="text-xl font-bold mb-5">Add Anime</h2>
      <input type="hidden" id="editId">

      <div class="space-y-4 text-sm">
        <div>
          <label class="block mb-1 text-slate-600">Anime Name</label>
          <input id="animeName" type="text" class="w-full glass rounded-2xl px-4 py-3" placeholder="Solo Leveling">
        </div>
        <!-- Other fields remain the same -->
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block mb-1 text-slate-600">Season</label><input id="season" type="text" class="w-full glass rounded-2xl px-4 py-3"></div>
          <div><label class="block mb-1 text-slate-600">Rating</label><input id="rating" type="number" min="0" max="10" step="0.1" value="0" class="w-full glass rounded-2xl px-4 py-3"></div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block mb-1 text-slate-600">Watched</label><input id="epWatched" type="number" value="0" class="w-full glass rounded-2xl px-4 py-3"></div>
          <div><label class="block mb-1 text-slate-600">Total Eps</label><input id="totalEps" type="number" class="w-full glass rounded-2xl px-4 py-3"></div>
        </div>
        <div>
          <label class="block mb-1 text-slate-600">Status</label>
          <select id="status" class="w-full glass rounded-2xl px-4 py-3">
            <option value="Watching">Watching</option>
            <option value="Completed">Completed</option>
            <option value="Dropped">Dropped</option>
            <option value="Plan to Watch">Plan to Watch</option>
          </select>
        </div>
        <div>
          <label class="block mb-1 text-slate-600">Notes</label>
          <textarea id="notes" class="w-full glass rounded-3xl px-4 py-3 h-20"></textarea>
        </div>
      </div>

      <div class="flex gap-3 mt-6">
        <button onclick="closeModal()" class="flex-1 py-3 bg-slate-200 hover:bg-slate-300 rounded-2xl">Cancel</button>
        <button onclick="saveAnime()" class="flex-1 py-3 bg-violet-600 text-white rounded-2xl">Save</button>
      </div>
    </div>
  </div>

  <script>
    let animeList = [];
    let currentDetailId = null;

    async function fetchAnimeImage(animeName) {
      try {
        const res = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(animeName)}&limit=1`);
        const data = await res.json();
        if (data.data && data.data.length > 0) {
          return data.data[0].images.jpg.large_image_url || data.data[0].images.jpg.image_url;
        }
      } catch (e) {}
      return null;
    }

    function loadData() {
      animeList = JSON.parse(localStorage.getItem('myAnimeList') || '[]');
      renderAll();
      updateStats();
    }

    function saveData() {
      localStorage.setItem('myAnimeList', JSON.stringify(animeList));
    }

    function updateStats() {
      const total = animeList.length;
      const completed = animeList.filter(a => a.status === 'Completed').length;
      const watching = animeList.filter(a => a.status === 'Watching').length;
      const plan = animeList.filter(a => a.status === 'Plan to Watch').length;

      document.getElementById('stats').innerHTML = `
        <div class="glass rounded-3xl p-4 text-center">
          <p class="text-xs text-violet-600">TOTAL</p>
          <p class="text-3xl font-bold">${total}</p>
        </div>
        <div class="glass rounded-3xl p-4 text-center">
          <p class="text-xs text-emerald-600">COMPLETED</p>
          <p class="text-3xl font-bold text-emerald-600">${completed}</p>
        </div>
        <div class="glass rounded-3xl p-4 text-center">
          <p class="text-xs text-blue-600">WATCHING</p>
          <p class="text-3xl font-bold text-blue-600">${watching}</p>
        </div>
        <div class="glass rounded-3xl p-4 text-center">
          <p class="text-xs text-amber-600">PLAN</p>
          <p class="text-3xl font-bold text-amber-600">${plan}</p>
        </div>
      `;
    }

    function getStatusClass(status) {
      switch(status) {
        case 'Completed': return 'bg-emerald-100 text-emerald-700';
        case 'Watching': return 'bg-blue-100 text-blue-700';
        case 'Dropped': return 'bg-red-100 text-red-700';
        default: return 'bg-amber-100 text-amber-700';
      }
    }

    function calculateProgress(anime) {
      if (!anime.totalEpisodes) return { percent: 100, text: anime.episodesWatched + " eps" };
      const percent = Math.min(Math.round((anime.episodesWatched / anime.totalEpisodes) * 100), 100);
      return { percent, text: `${anime.episodesWatched}/${anime.totalEpisodes}` };
    }

    function renderAll(filtered = animeList) {
      renderMobileCards(filtered);
      renderDesktopTable(filtered);
    }

    // Render functions (same as before, compact)
    function renderMobileCards(filtered) {
      const container = document.getElementById('mobileView');
      container.innerHTML = '';

      filtered.forEach(anime => {
        const prog = calculateProgress(anime);
        container.innerHTML += `
          <div class="card glass rounded-3xl p-4 cursor-pointer" onclick="showDetails('${anime.id}')">
            <div class="flex gap-4">
              <div class="flex-1">
                <p class="font-semibold text-base">${anime.animeName}</p>
                <p class="text-violet-600 text-sm">${anime.season || '—'}</p>
                <div class="mt-3 flex justify-between text-sm">
                  <span>${prog.text}</span>
                  <span class="text-amber-500">${anime.rating ? `⭐ ${anime.rating}` : ''}</span>
                </div>
                <div class="progress-container mt-2">
                  <div class="progress-bar" style="width: ${prog.percent}%"></div>
                </div>
              </div>
            </div>
            <span class="mt-4 inline-block px-4 py-1 text-xs rounded-2xl ${getStatusClass(anime.status)}">${anime.status}</span>
          </div>
        `;
      });

      if (filtered.length === 0) container.innerHTML = `<p class="text-center text-slate-500 py-12">No anime found</p>`;
    }

    function renderDesktopTable(filtered) {
      const tbody = document.getElementById('animeList');
      tbody.innerHTML = '';

      filtered.forEach(anime => {
        const prog = calculateProgress(anime);
        tbody.innerHTML += `
          <tr class="hover:bg-slate-50 cursor-pointer" onclick="showDetails('${anime.id}')">
            <td class="p-4 font-medium">${anime.animeName}</td>
            <td class="p-4 text-slate-600">${anime.season || '—'}</td>
            <td class="p-4">
              <div class="flex items-center gap-2">
                <div class="flex-1 progress-container">
                  <div class="progress-bar" style="width: ${prog.percent}%"></div>
                </div>
                <span class="text-xs font-mono">${prog.text}</span>
              </div>
            </td>
            <td class="p-4">${anime.rating ? `⭐ ${anime.rating}` : '—'}</td>
            <td class="p-4"><span class="px-4 py-1 text-xs rounded-2xl ${getStatusClass(anime.status)}">${anime.status}</span></td>
            <td class="p-4 text-center" onclick="event.stopImmediatePropagation()">
              <button onclick="editAnime('${anime.id}');event.stopImmediatePropagation()" class="text-violet-600"><i class="fas fa-edit"></i></button>
              <button onclick="deleteAnime('${anime.id}');event.stopImmediatePropagation()" class="text-red-500 ml-3"><i class="fas fa-trash"></i></button>
            </td>
          </tr>
        `;
      });
    }

    async function showDetails(id) {
      const anime = animeList.find(a => a.id === id);
      if (!anime) return;
      currentDetailId = id;

      document.getElementById('detailName').textContent = anime.animeName;
      document.getElementById('detailSeason').textContent = anime.season || '—';
      
      const prog = calculateProgress(anime);
      document.getElementById('detailProgress').textContent = prog.text;
      document.getElementById('detailProgressBar').style.width = prog.percent + '%';
      
      document.getElementById('detailRating').innerHTML = anime.rating ? `⭐ ${anime.rating}/10` : '—';
      document.getElementById('detailNotes').textContent = anime.notes || 'No notes added.';

      const statusEl = document.getElementById('detailStatus');
      statusEl.textContent = anime.status;
      statusEl.className = `inline-block px-4 py-1 text-xs rounded-full ${getStatusClass(anime.status)}`;

      // Loading
      document.getElementById('loadingSpinner').classList.remove('hidden');
      document.getElementById('detailImage').classList.add('hidden');

      const imageUrl = await fetchAnimeImage(anime.animeName);
      const img = document.getElementById('detailImage');
      
      document.getElementById('loadingSpinner').classList.add('hidden');
      img.src = imageUrl || 'https://via.placeholder.com/600x400?text=No+Image+Found';
      img.classList.remove('hidden');

      document.getElementById('detailsModal').classList.remove('hidden');
    }

    function closeDetailsModal() {
      document.getElementById('detailsModal').classList.add('hidden');
    }

    function editFromDetails() {
      closeDetailsModal();
      if (currentDetailId) editAnime(currentDetailId);
    }

    // Sort + Filter Logic
    function filterTable() {
      const search = document.getElementById('searchInput').value.toLowerCase().trim();
      const statusFilter = document.getElementById('statusFilter').value;
      const sortOption = document.getElementById('sortFilter').value;

      let filtered = animeList.filter(anime => {
        const matchSearch = anime.animeName.toLowerCase().includes(search) || 
                           (anime.season && anime.season.toLowerCase().includes(search));
        const matchStatus = !statusFilter || anime.status === statusFilter;
        return matchSearch && matchStatus;
      });

      // Apply Sorting
      filtered.sort((a, b) => {
        switch(sortOption) {
          case 'name-asc': return a.animeName.localeCompare(b.animeName);
          case 'name-desc': return b.animeName.localeCompare(a.animeName);
          case 'rating-desc': return (b.rating || 0) - (a.rating || 0);
          case 'rating-asc': return (a.rating || 0) - (b.rating || 0);
          case 'progress-desc':
            const progA = a.totalEpisodes ? a.episodesWatched / a.totalEpisodes : 0;
            const progB = b.totalEpisodes ? b.episodesWatched / b.totalEpisodes : 0;
            return progB - progA;
          case 'updated-desc':
            return new Date(b.lastUpdated || 0) - new Date(a.lastUpdated || 0);
          default: return 0;
        }
      });

      renderAll(filtered);
    }

    // Other functions (showAddModal, saveAnime, editAnime, deleteAnime, export etc.) are same as previous version
    function showAddModal() {
      document.getElementById('modalTitle').textContent = 'Add New Anime';
      document.getElementById('editId').value = '';
      document.getElementById('animeName').value = '';
      document.getElementById('season').value = '';
      document.getElementById('epWatched').value = '0';
      document.getElementById('totalEps').value = '';
      document.getElementById('rating').value = '0';
      document.getElementById('status').value = 'Watching';
      document.getElementById('notes').value = '';
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function saveAnime() {
      const id = document.getElementById('editId').value;
      const animeName = document.getElementById('animeName').value.trim();
      if (!animeName) return alert("Anime name is required!");

      const anime = {
        id: id || Date.now().toString(),
        animeName,
        season: document.getElementById('season').value.trim(),
        episodesWatched: parseInt(document.getElementById('epWatched').value) || 0,
        totalEpisodes: parseInt(document.getElementById('totalEps').value) || null,
        rating: parseFloat(document.getElementById('rating').value) || 0,
        status: document.getElementById('status').value,
        notes: document.getElementById('notes').value.trim(),
        lastUpdated: new Date().toISOString()
      };

      if (id) {
        const index = animeList.findIndex(a => a.id === id);
        if (index !== -1) animeList[index] = anime;
      } else {
        animeList.push(anime);
      }

      saveData();
      closeModal();
      renderAll();
      updateStats();
    }

    function editAnime(id) {
      const anime = animeList.find(a => a.id === id);
      if (!anime) return;
      document.getElementById('modalTitle').textContent = 'Edit Anime';
      document.getElementById('editId').value = anime.id;
      document.getElementById('animeName').value = anime.animeName;
      document.getElementById('season').value = anime.season || '';
      document.getElementById('epWatched').value = anime.episodesWatched;
      document.getElementById('totalEps').value = anime.totalEpisodes || '';
      document.getElementById('rating').value = anime.rating || 0;
      document.getElementById('status').value = anime.status;
      document.getElementById('notes').value = anime.notes || '';
      document.getElementById('modal').classList.remove('hidden');
    }

    function deleteAnime(id) {
      if (confirm('Delete this anime?')) {
        animeList = animeList.filter(a => a.id !== id);
        saveData();
        renderAll();
        updateStats();
      }
    }

    function exportJSON() {
      if (animeList.length === 0) return alert("Your list is empty!");
      const dataStr = JSON.stringify(animeList, null, 2);
      const link = document.createElement('a');
      link.href = 'data:application/json,' + encodeURIComponent(dataStr);
      link.download = `anime_list_${new Date().toISOString().slice(0,10)}.json`;
      link.click();
    }

    function importJSON(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          animeList = JSON.parse(e.target.result);
          saveData();
          renderAll();
          updateStats();
          alert("✅ Successfully imported!");
        } catch (err) {
          alert("❌ Invalid JSON file");
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    function exportPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.text("My Anime Tracker", 20, 20);
      let y = 35;
      animeList.forEach(anime => {
        if (y > 270) { doc.addPage(); y = 30; }
        const prog = calculateProgress(anime);
        doc.text(anime.animeName, 20, y);
        doc.text(prog.text, 160, y);
        y += 12;
      });
      doc.save("My_Anime_List.pdf");
    }

    window.onload = loadData;
  </script>
</body>
</html>
